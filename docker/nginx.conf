# GS ERP — Nginx production config
# Place your domain in DOMAIN variable — replace gs-erp.example.com below.

upstream django {
    server api:8000;
}

# ── HTTP: redirect to HTTPS + handle ACME challenge ────────────────────────
server {
    listen 80;
    server_name gs-erp.example.com www.gs-erp.example.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ───────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name gs-erp.example.com www.gs-erp.example.com;

    ssl_certificate     /etc/letsencrypt/live/gs-erp.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gs-erp.example.com/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=2592000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy "same-origin" always;

    client_max_body_size 20M;

    # Static files — served directly by nginx
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Media files
    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Django application
    location / {
        proxy_pass http://django;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}
