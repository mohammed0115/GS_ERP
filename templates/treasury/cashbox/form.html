{% extends "base.html" %}
{% load i18n erp_money %}

{% block title %}{% trans "New Cashbox" %}{% endblock %}

{% block content %}
{% include "_partials/page_header.html" with title=_("New Cashbox") back_url="treasury_web:cashbox_list"|url %}

<div class="card shadow-sm" style="max-width:640px">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>{% trans "Code" %} <span class="text-danger">*</span></label>
                <input type="text" name="code" class="form-control" required maxlength="32">
            </div>
            <div class="form-group">
                <label>{% trans "Name" %} <span class="text-danger">*</span></label>
                <input type="text" name="name" class="form-control" required maxlength="128">
            </div>
            <div class="form-group">
                <label>{% trans "Currency" %}</label>
                <input type="text" name="currency_code" class="form-control" value="SAR" maxlength="3">
            </div>
            <div class="form-group">
                <label>{% trans "GL Account" %} <span class="text-danger">*</span></label>
                <select name="gl_account_id" class="form-control selectpicker" data-live-search="true" required>
                    <option value="">{% trans "Select GL account…" %}</option>
                    {% for acc in gl_accounts %}
                    <option value="{{ acc.pk }}">{{ acc.code }} — {{ acc.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>{% trans "Opening Balance" %}</label>
                <input type="number" name="opening_balance" class="form-control" value="0" step="0.0001" min="0">
            </div>
            <div class="form-group">
                <label>{% trans "Notes" %}</label>
                <textarea name="notes" class="form-control" rows="3"></textarea>
            </div>
            <button type="submit" class="btn btn-primary">{% trans "Create Cashbox" %}</button>
            <a href="{% url 'treasury_web:cashbox_list' %}" class="btn btn-outline-secondary ml-2">{% trans "Cancel" %}</a>
        </form>
    </div>
</div>
{% endblock %}
